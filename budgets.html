<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinFlow - Бюджеты и Планирование</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: '#4f46e5', 'brand-light': '#e0e7ff' }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #d1d5db; }
        
        .donut-chart { border-radius: 50%; display: flex; justify-content: center; align-items: center; position: relative; }
        .donut-inner { width: 70%; height: 70%; background-color: white; border-radius: 50%; position: absolute; display: flex; flex-direction: column; justify-content: center; align-items: center; }

        /* Плавное появление кнопок редактирования */
        .action-btns { opacity: 0; transition: opacity 0.2s; }
        .group:hover .action-btns { opacity: 1; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans flex h-screen overflow-hidden">

    <aside class="w-64 bg-white border-r border-gray-200 flex flex-col justify-between hidden md:flex shrink-0 z-20">
        <div>
            <div class="p-6 flex items-center space-x-2">
                <div class="w-8 h-8 bg-brand rounded-lg flex items-center justify-center">
                    <div class="w-4 h-4 bg-white rounded-sm transform rotate-45"></div>
                </div>
                <span class="text-xl font-bold text-gray-900">FinFlow</span>
            </div>
            <nav class="mt-4 px-4 space-y-1">
                <a href="index.html" class="flex items-center space-x-3 w-full px-4 py-3 text-gray-600 hover:bg-gray-50 rounded-xl font-medium transition">
                    <i class="ph ph-wallet text-xl"></i><span>Счета</span>
                </a>
                <a href="operations.html" class="flex items-center space-x-3 w-full px-4 py-3 text-gray-600 hover:bg-gray-50 rounded-xl font-medium transition">
                    <i class="ph ph-list-dashes text-xl"></i><span>Операции</span>
                </a>
                <a href="budgets.html" class="flex items-center space-x-3 w-full px-4 py-3 bg-brand-light text-brand rounded-xl font-medium transition">
                    <i class="ph ph-chart-pie-slice text-xl"></i><span>Бюджеты</span>
                </a>
                <a href="debts.html" class="flex items-center space-x-3 w-full px-4 py-3 text-gray-600 hover:bg-gray-50 rounded-xl font-medium transition">
                    <i class="ph ph-hand-coins text-xl"></i><span>Долги / Рассрочки</span>
                </a>
            </nav>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto flex flex-col relative" id="main-scroll">
        <header class="bg-white border-b border-gray-200 px-8 py-4 flex justify-between items-center sticky top-0 z-10">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Бюджеты</h1>
                <p class="text-sm text-gray-500 mt-1" id="current-month-header">Текущий месяц</p>
            </div>
            <div class="flex items-center space-x-4">
                <button onclick="openNewBudgetModal()" class="flex items-center space-x-2 bg-brand text-white px-4 py-2 rounded-xl hover:bg-indigo-700 transition shadow-sm">
                    <i class="ph ph-plus"></i><span class="hidden sm:inline">Новый лимит</span>
                </button>
            </div>
        </header>

        <div class="p-8 flex-1 flex flex-col xl:flex-row gap-8">
            
            <div class="flex-1 min-w-0 space-y-8">
                
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                        <div class="text-sm font-medium text-gray-500 mb-2">План на месяц</div>
                        <div class="text-xl font-bold" id="card-plan-byn">0 Br</div>
                        <div class="text-xs text-gray-400 mt-1" id="card-plan-rub">0 ₽</div>
                    </div>
                    <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                        <div class="text-sm font-medium text-gray-500 mb-2">Потрачено</div>
                        <div class="text-xl font-bold" id="card-spent-byn">0 Br</div>
                        <div class="text-xs text-gray-400 mt-1" id="card-spent-rub">0 ₽</div>
                    </div>
                    <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                        <div class="text-sm font-medium text-gray-500 mb-2">Осталось</div>
                        <div class="text-xl font-bold text-brand" id="card-left-byn">0 Br</div>
                        <div class="text-xs text-indigo-300 mt-1" id="card-left-rub">0 ₽</div>
                    </div>
                    <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                        <div class="text-sm font-medium text-gray-500 mb-2">Экономия</div>
                        <div class="text-xl font-bold" id="card-save-byn">0 Br</div>
                        <div class="text-xs mt-1" id="card-save-rub">0 ₽</div>
                    </div>
                </div>

                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden flex flex-col">
                    <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                        <div class="flex space-x-6 text-sm font-medium">
                            <button class="text-brand border-b-2 border-brand pb-1">По категориям</button>
                            <button class="text-gray-400 hover:text-gray-700 pb-1">Обзор</button>
                            <button class="text-gray-400 hover:text-gray-700 pb-1">По валютам</button>
                        </div>
                        <select id="table-currency-filter" onchange="renderBudgetTable()" class="text-sm border border-gray-200 rounded-lg px-3 py-1 outline-none bg-white">
                            <option value="Br">BYN (Br)</option>
                            <option value="₽">RUB (₽)</option>
                        </select>
                    </div>
                    <div class="p-4 space-y-4" id="budget-list-container">
                        </div>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="font-bold text-gray-900" id="calendar-month-title">Календарь платежей</h3>
                        <button onclick="openNewPaymentModal()" class="text-brand hover:text-indigo-800 text-sm font-medium"><i class="ph ph-plus"></i> Добавить</button>
                    </div>
                    <div class="grid grid-cols-7 gap-2 text-center text-xs font-bold text-gray-400 mb-2 uppercase">
                        <div>Пн</div><div>Вт</div><div>Ср</div><div>Чт</div><div>Пт</div><div class="text-red-400">Сб</div><div class="text-red-400">Вс</div>
                    </div>
                    <div id="calendar-grid" class="grid grid-cols-7 gap-2 overflow-y-auto max-h-[500px] pr-1">
                        </div>
                </div>

            </div>

            <aside class="w-full xl:w-[350px] shrink-0 space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="font-bold text-gray-900">Распределение</h3>
                        <div class="flex bg-gray-100 rounded-lg p-0.5">
                            <button onclick="setChartCurrency('Br')" id="btn-chart-br" class="px-3 py-1 text-xs font-bold rounded bg-white shadow-sm">Br</button>
                            <button onclick="setChartCurrency('₽')" id="btn-chart-rub" class="px-3 py-1 text-xs font-bold rounded text-gray-500">₽</button>
                        </div>
                    </div>
                    <div class="flex justify-center mb-6">
                        <div id="budget-donut" class="donut-chart w-48 h-48 bg-gray-100">
                            <div class="donut-inner">
                                <span class="text-xs text-gray-400 uppercase tracking-wider">План</span>
                                <span class="text-xl font-bold text-gray-900" id="donut-total">0</span>
                            </div>
                        </div>
                    </div>
                    <div id="donut-legend" class="space-y-3 text-sm"></div>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col h-[400px]">
                    <h3 class="font-bold text-gray-900 uppercase tracking-wider text-sm mb-4">Ближайшие списания</h3>
                    <div id="upcoming-payments-container" class="space-y-3 overflow-y-auto pr-2 flex-1">
                        </div>
                </div>
            </aside>
        </div>
    </main>

    <div id="budget-modal" class="fixed inset-0 bg-gray-900 bg-opacity-50 hidden items-center justify-center z-50 p-4 backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold" id="budget-modal-title">Новый лимит</h3>
                <button onclick="closeModal('budget-modal')" class="text-gray-400 hover:text-gray-700"><i class="ph ph-x text-2xl"></i></button>
            </div>
            <form onsubmit="saveBudget(event)" class="space-y-4">
                <input type="hidden" id="budget-id">
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Название категории</label>
                    <input type="text" id="budget-cat" list="cat-list" required placeholder="Например: Еда, Машина, Снэки" class="w-full px-4 py-2 border border-gray-300 rounded-xl outline-none focus:border-brand">
                    <datalist id="cat-list">
                        <option value="Еда"></option><option value="Машина"></option><option value="Дом"></option>
                        <option value="Развлечения"></option><option value="Путешествия"></option>
                    </datalist>
                </div>
                
                <div class="flex items-center space-x-2 mt-2">
                    <input type="checkbox" id="is-subbudget" onchange="toggleSubBudget()" class="rounded text-brand focus:ring-brand">
                    <label for="is-subbudget" class="text-sm text-gray-600">Это подкатегория</label>
                </div>
                
                <div id="parent-budget-container" class="hidden">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Родительская категория</label>
                    <select id="parent-budget" class="w-full px-4 py-2 border border-gray-300 rounded-xl outline-none focus:border-brand">
                        </select>
                </div>

                <div class="flex space-x-4">
                    <div class="flex-1">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Лимит</label>
                        <input type="number" id="budget-amount" required class="w-full px-4 py-2 border border-gray-300 rounded-xl outline-none focus:border-brand">
                    </div>
                    <div class="w-24">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Валюта</label>
                        <select id="budget-currency" class="w-full px-4 py-2 border border-gray-300 rounded-xl outline-none focus:border-brand">
                            <option value="Br">Br</option><option value="₽">₽</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="w-full bg-brand text-white py-3 rounded-xl hover:bg-indigo-700 mt-2 transition">Сохранить</button>
            </form>
        </div>
    </div>

    <div id="payment-modal" class="fixed inset-0 bg-gray-900 bg-opacity-50 hidden items-center justify-center z-50 p-4 backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold" id="payment-modal-title">Новый платеж</h3>
                <button onclick="closeModal('payment-modal')" class="text-gray-400 hover:text-gray-700"><i class="ph ph-x text-2xl"></i></button>
            </div>
            <form onsubmit="savePayment(event)" class="space-y-4">
                <input type="hidden" id="pay-id">
                <input type="text" id="pay-title" placeholder="Название (Аренда, Рассрочка)" required class="w-full px-4 py-2 border border-gray-300 rounded-xl outline-none">
                <div class="flex space-x-4">
                    <input type="number" id="pay-amount" placeholder="Сумма" required class="w-full px-4 py-2 border border-gray-300 rounded-xl outline-none">
                    <select id="pay-currency" class="w-24 px-4 py-2 border border-gray-300 rounded-xl outline-none"><option value="Br">Br</option><option value="₽">₽</option></select>
                </div>
                <div class="flex space-x-4">
                    <input type="date" id="pay-date" required class="w-full px-4 py-2 border border-gray-300 rounded-xl outline-none">
                    <select id="pay-type" class="w-full px-4 py-2 border border-gray-300 rounded-xl outline-none"><option>Обычный</option><option>Долг/Рассрочка</option></select>
                </div>
                <button type="submit" class="w-full bg-brand text-white py-3 rounded-xl">Сохранить</button>
            </form>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://ujjuoyfykkmgcaeujami.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVqanVveWZ5a2ttZ2NhZXVqYW1pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3Nzg1MDYsImV4cCI6MjA5ODM1NDUwNn0.Rf9cDJQrsr8mTfaNBgpUabwU3oq81Wcvr8xcyYIoKFg';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        let budgets = [], payments = [], transactions = [];
        let chartCurrency = 'Br';
        
        const currentMonth = new Date().toISOString().substring(0, 7);
        const lastMonthDate = new Date(); lastMonthDate.setMonth(lastMonthDate.getMonth() - 1);
        const lastMonth = lastMonthDate.toISOString().substring(0, 7);

        document.getElementById('calendar-month-title').innerText = new Date().toLocaleString('ru', { month: 'long', year: 'numeric' });

        const formatMoney = (amount, curr) => Number(amount).toLocaleString('ru-RU', { minimumFractionDigits: 0, maximumFractionDigits: 0 }) + ' ' + curr;

        const colors = ['#4f46e5', '#10b981', '#f59e0b', '#ec4899', '#8b5cf6', '#06b6d4', '#64748b'];

        // Подбор иконки по ключевому слову
        function getCategoryIcon(catName) {
            const name = catName.toLowerCase();
            if(name.includes('ед') || name.includes('продукт') || name.includes('снэк')) return 'ph-hamburger text-orange-500 bg-orange-100';
            if(name.includes('авто') || name.includes('машин') || name.includes('бенз')) return 'ph-car text-blue-500 bg-blue-100';
            if(name.includes('дом') || name.includes('квартир') || name.includes('аренд')) return 'ph-house text-emerald-500 bg-emerald-100';
            if(name.includes('развлеч') || name.includes('игр')) return 'ph-game-controller text-purple-500 bg-purple-100';
            if(name.includes('путешеств') || name.includes('отпуск')) return 'ph-airplane text-cyan-500 bg-cyan-100';
            if(name.includes('здоров') || name.includes('аптек')) return 'ph-pill text-red-500 bg-red-100';
            return 'ph-wallet text-brand bg-brand-light';
        }

        async function initData() {
            try {
                const [transRes, budRes, payRes] = await Promise.all([
                    supabaseClient.from('transactions').select('*').eq('type', 'Расход'),
                    supabaseClient.from('budgets').select('*').eq('month', currentMonth),
                    supabaseClient.from('upcoming_payments').select('*').order('due_date', { ascending: true })
                ]);
                
                transactions = transRes.data || [];
                budgets = budRes.data || [];
                payments = payRes.data || [];

                calculateTopCards();
                renderBudgetTable();
                renderCalendar();
                renderPayments();
                renderDonutChart();
            } catch (error) {
                console.error("Ошибка загрузки:", error);
            }
        }

        function calculateTopCards() {
            let pByn = 0, pRub = 0, sByn = 0, sRub = 0, lsByn = 0, lsRub = 0;
            
            budgets.filter(b => !b.parent_id).forEach(b => {
                if(b.currency === 'Br') pByn += Number(b.planned_amount);
                if(b.currency === '₽') pRub += Number(b.planned_amount);
            });

            transactions.forEach(t => {
                if(t.created_at.startsWith(currentMonth)) {
                    if(t.currency === 'Br') sByn += Number(t.amount);
                    if(t.currency === '₽') sRub += Number(t.amount);
                } else if(t.created_at.startsWith(lastMonth)) {
                    if(t.currency === 'Br') lsByn += Number(t.amount);
                    if(t.currency === '₽') lsRub += Number(t.amount);
                }
            });

            document.getElementById('card-plan-byn').innerText = formatMoney(pByn, 'Br'); document.getElementById('card-plan-rub').innerText = formatMoney(pRub, '₽');
            document.getElementById('card-spent-byn').innerText = formatMoney(sByn, 'Br'); document.getElementById('card-spent-rub').innerText = formatMoney(sRub, '₽');
            
            let lByn = pByn - sByn, lRub = pRub - sRub;
            document.getElementById('card-left-byn').innerText = formatMoney(lByn, 'Br'); document.getElementById('card-left-rub').innerText = formatMoney(lRub, '₽');
            
            let svByn = lsByn - sByn, svRub = lsRub - sRub;
            document.getElementById('card-save-byn').innerText = (svByn >= 0 ? '+' : '') + formatMoney(svByn, 'Br');
            document.getElementById('card-save-byn').className = `text-xl font-bold ${svByn >= 0 ? 'text-emerald-500' : 'text-red-500'}`;
            document.getElementById('card-save-rub').innerText = (svRub >= 0 ? '+' : '') + formatMoney(svRub, '₽');
            document.getElementById('card-save-rub').className = `text-xs mt-1 ${svRub >= 0 ? 'text-emerald-400' : 'text-red-400'}`;
        }

        function getSpentForCategory(cat, curr) {
            let spent = 0;
            transactions.forEach(t => { if(t.created_at.startsWith(currentMonth) && t.currency === curr && t.category === cat) spent += Number(t.amount); });
            return spent;
        }

        function renderBudgetTable() {
            const container = document.getElementById('budget-list-container');
            const curr = document.getElementById('table-currency-filter').value;
            let html = '';

            const parents = budgets.filter(b => !b.parent_id && b.currency === curr);
            
            parents.forEach(p => {
                const children = budgets.filter(b => b.parent_id === p.id);
                const spent = getSpentForCategory(p.category, curr);
                const pct = Math.min((spent / p.planned_amount) * 100, 100).toFixed(0);
                const barColor = spent > p.planned_amount ? 'bg-red-500' : 'bg-brand';
                const iconClasses = getCategoryIcon(p.category);

                html += `
                <div class="group border border-gray-100 rounded-2xl p-4 hover:shadow-md transition bg-white relative">
                    
                    <div class="action-btns absolute top-4 right-4 flex space-x-2 bg-white px-2 rounded-lg shadow-sm border border-gray-100 z-10">
                        <button onclick="editBudget('${p.id}')" class="text-gray-400 hover:text-brand p-1"><i class="ph ph-pencil-simple text-lg"></i></button>
                        <button onclick="deleteBudget('${p.id}')" class="text-gray-400 hover:text-red-500 p-1"><i class="ph ph-trash text-lg"></i></button>
                    </div>

                    <div class="flex items-center justify-between mb-3 pr-16">
                        <div class="flex items-center space-x-4 flex-1">
                            <div class="w-12 h-12 rounded-2xl flex items-center justify-center shrink-0 ${iconClasses.split(' ').slice(1).join(' ')}">
                                <i class="ph ${iconClasses.split(' ')[0]} text-2xl"></i>
                            </div>
                            <div class="flex-1">
                                <div class="flex justify-between items-baseline mb-1">
                                    <h4 class="font-bold text-gray-900 text-lg">${p.category}</h4>
                                    <span class="text-sm font-medium ${spent > p.planned_amount ? 'text-red-500' : 'text-gray-500'}">
                                        ${formatMoney(spent, curr)} / ${formatMoney(p.planned_amount, curr)}
                                    </span>
                                </div>
                                <div class="w-full bg-gray-100 rounded-full h-2.5 overflow-hidden flex">
                                    <div class="${barColor} h-2.5 rounded-full transition-all duration-500" style="width: ${pct}%"></div>
                                </div>
                            </div>
                        </div>
                    </div>`;

                // Подкатегории
                if(children.length > 0) {
                    html += `<div class="mt-4 pt-3 border-t border-gray-50 space-y-3 pl-16">`;
                    children.forEach(c => {
                        const cSpent = getSpentForCategory(c.category, curr);
                        const cPct = Math.min((cSpent / c.planned_amount) * 100, 100).toFixed(0);
                        html += `
                        <div class="group/sub flex items-center justify-between relative">
                            <div class="flex-1 pr-12">
                                <div class="flex justify-between items-baseline text-sm mb-1">
                                    <span class="text-gray-600 flex items-center"><div class="w-1.5 h-1.5 rounded-full bg-gray-300 mr-2"></div>${c.category}</span>
                                    <span class="text-gray-500">${formatMoney(cSpent, curr)} / ${formatMoney(c.planned_amount, curr)}</span>
                                </div>
                                <div class="w-full bg-gray-50 rounded-full h-1.5"><div class="bg-blue-300 h-1.5 rounded-full" style="width: ${cPct}%"></div></div>
                            </div>
                            <div class="absolute right-0 flex space-x-1 opacity-0 group-hover/sub:opacity-100 transition">
                                <button onclick="editBudget('${c.id}')" class="text-gray-400 hover:text-brand"><i class="ph ph-pencil-simple"></i></button>
                                <button onclick="deleteBudget('${c.id}')" class="text-gray-400 hover:text-red-500"><i class="ph ph-trash"></i></button>
                            </div>
                        </div>`;
                    });
                    html += `</div>`;
                }
                html += `</div>`;
            });

            if(!html) html = `<div class="text-center py-10 text-gray-400">Нет планов в выбранной валюте</div>`;
            container.innerHTML = html;
        }

        // --- Календарь и Платежи ---
        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            const now = new Date();
            const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
            let startOffset = firstDay === 0 ? 6 : firstDay - 1;
            
            let html = '';
            for(let i = 0; i < startOffset; i++) html += `<div class="p-2 border border-transparent"></div>`;
            
            for(let day = 1; day <= daysInMonth; day++) {
                let dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                let dayPays = payments.filter(p => p.due_date === dateStr && !p.is_paid);
                
                let payBadges = '';
                dayPays.forEach(p => {
                    let isDebt = p.payment_type.includes('Долг') || p.payment_type.includes('Рассрочка');
                    payBadges += `<div onclick="editPayment('${p.id}')" class="text-[10px] ${isDebt ? 'bg-red-500' : 'bg-brand'} text-white px-1 py-0.5 rounded mt-1 truncate w-full shadow-sm cursor-pointer hover:opacity-80" title="${p.title}">${p.title}</div>`;
                });

                let isToday = day === now.getDate() ? 'bg-indigo-50 border-brand text-brand font-bold' : 'border-gray-100 hover:bg-gray-50';
                
                html += `
                <div class="border rounded-xl p-1.5 flex flex-col items-end justify-start min-h-[80px] transition ${isToday}">
                    <span class="text-xs mr-1">${day}</span>
                    <div class="w-full flex flex-col items-center mt-1 space-y-1">${payBadges}</div>
                </div>`;
            }
            grid.innerHTML = html;
        }

        function renderPayments() {
            let html = '';
            const today = new Date(); today.setHours(0,0,0,0);
            
            payments.filter(p => !p.is_paid).forEach(p => {
                const dDate = new Date(p.due_date);
                const diffDays = Math.ceil((dDate - today) / (1000 * 60 * 60 * 24));
                let statusText = diffDays < 0 ? 'Проср.' : (diffDays === 0 ? 'Сегодня' : `${diffDays} дн.`);
                let color = diffDays <= 3 ? 'text-red-500 bg-red-50' : 'text-gray-500 bg-gray-100';
                let icon = p.payment_type.includes('Долг') ? 'ph-hand-coins text-red-500' : 'ph-calendar text-brand';

                html += `
                <div class="group flex items-center justify-between p-3 border border-gray-100 rounded-xl bg-white hover:shadow-sm transition relative">
                    <div class="flex items-center space-x-3 overflow-hidden">
                        <div class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center shrink-0"><i class="ph ${icon}"></i></div>
                        <div class="truncate">
                            <p class="text-sm font-semibold text-gray-900 truncate pr-6">${p.title}</p>
                            <p class="text-xs text-gray-500">${new Date(p.due_date).toLocaleDateString('ru-RU', {day:'2-digit', month:'short'})}</p>
                        </div>
                    </div>
                    <div class="text-right pl-2 shrink-0 flex flex-col items-end">
                        <p class="text-sm font-bold">${formatMoney(p.amount, p.currency)}</p>
                        <span class="text-[10px] font-bold px-1.5 py-0.5 rounded mt-0.5 ${color}">${statusText}</span>
                    </div>
                    <div class="absolute right-2 top-1/2 -translate-y-1/2 flex flex-col space-y-1 opacity-0 group-hover:opacity-100 transition bg-white p-1 rounded shadow-sm border border-gray-100">
                        <button onclick="editPayment('${p.id}')" class="text-gray-400 hover:text-brand"><i class="ph ph-pencil-simple"></i></button>
                        <button onclick="deletePayment('${p.id}')" class="text-gray-400 hover:text-red-500"><i class="ph ph-trash"></i></button>
                    </div>
                </div>`;
            });
            document.getElementById('upcoming-payments-container').innerHTML = html || '<p class="text-xs text-gray-400 text-center py-4">Нет платежей</p>';
        }

        function setChartCurrency(curr) {
            chartCurrency = curr;
            document.getElementById('btn-chart-br').className = curr === 'Br' ? 'px-3 py-1 text-xs font-bold rounded bg-white shadow-sm' : 'px-3 py-1 text-xs font-bold rounded text-gray-500 hover:bg-white hover:shadow-sm';
            document.getElementById('btn-chart-rub').className = curr === '₽' ? 'px-3 py-1 text-xs font-bold rounded bg-white shadow-sm' : 'px-3 py-1 text-xs font-bold rounded text-gray-500 hover:bg-white hover:shadow-sm';
            renderDonutChart();
        }

        function renderDonutChart() {
            const parents = budgets.filter(b => !b.parent_id && b.currency === chartCurrency);
            let total = parents.reduce((sum, b) => sum + Number(b.planned_amount), 0);
            
            document.getElementById('donut-total').innerText = formatMoney(total, chartCurrency);
            
            let gradientStr = ''; let legendHtml = ''; let currentPct = 0;

            if (total === 0) {
                document.getElementById('budget-donut').style.background = '#f3f4f6';
                document.getElementById('donut-legend').innerHTML = ''; return;
            }

            parents.forEach((b, i) => {
                let pct = (Number(b.planned_amount) / total) * 100;
                let color = colors[i % colors.length];
                gradientStr += `${color} ${currentPct}% ${currentPct + pct}%, `;
                currentPct += pct;

                legendHtml += `
                <div class="flex justify-between items-center">
                    <span class="flex items-center text-gray-600"><span class="w-2.5 h-2.5 rounded-full mr-2" style="background:${color}"></span>${b.category}</span>
                    <span class="font-medium">${Math.round(pct)}%</span>
                </div>`;
            });

            document.getElementById('budget-donut').style.background = `conic-gradient(${gradientStr.slice(0, -2)})`;
            document.getElementById('donut-legend').innerHTML = legendHtml;
        }

        // --- Управление Модалками, Редактирование, Удаление ---
        function openNewBudgetModal() {
            document.getElementById('budget-id').value = '';
            document.getElementById('budget-cat').value = '';
            document.getElementById('budget-amount').value = '';
            document.getElementById('is-subbudget').checked = false;
            document.getElementById('budget-modal-title').innerText = 'Новый лимит';
            toggleSubBudget();
            
            const pSelect = document.getElementById('parent-budget');
            pSelect.innerHTML = budgets.filter(b => !b.parent_id).map(b => `<option value="${b.id}">${b.category} (${b.currency})</option>`).join('');
            
            document.getElementById('budget-modal').classList.remove('hidden'); document.getElementById('budget-modal').classList.add('flex');
        }

        function openNewPaymentModal() { 
            document.getElementById('pay-id').value = '';
            document.getElementById('pay-title').value = '';
            document.getElementById('pay-amount').value = '';
            document.getElementById('payment-modal-title').innerText = 'Новый платеж';
            document.getElementById('payment-modal').classList.remove('hidden'); document.getElementById('payment-modal').classList.add('flex'); 
        }
        
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); document.getElementById(id).classList.remove('flex'); }
        
        function toggleSubBudget() {
            const isSub = document.getElementById('is-subbudget').checked;
            document.getElementById('parent-budget-container').style.display = isSub ? 'block' : 'none';
        }

        async function saveBudget(e) {
            e.preventDefault();
            const id = document.getElementById('budget-id').value;
            const isSub = document.getElementById('is-subbudget').checked;
            const payload = {
                month: currentMonth,
                category: document.getElementById('budget-cat').value,
                planned_amount: document.getElementById('budget-amount').value,
                currency: document.getElementById('budget-currency').value,
                parent_id: isSub ? document.getElementById('parent-budget').value : null
            };

            if (id) { await supabaseClient.from('budgets').update(payload).eq('id', id); } 
            else { await supabaseClient.from('budgets').insert([payload]); }
            
            closeModal('budget-modal'); initData();
        }

        async function editBudget(id) {
            const b = budgets.find(x => x.id === id);
            if(!b) return;
            openNewBudgetModal();
            document.getElementById('budget-modal-title').innerText = 'Редактировать лимит';
            document.getElementById('budget-id').value = b.id;
            document.getElementById('budget-cat').value = b.category;
            document.getElementById('budget-amount').value = b.planned_amount;
            document.getElementById('budget-currency').value = b.currency;
            if (b.parent_id) {
                document.getElementById('is-subbudget').checked = true;
                toggleSubBudget();
                document.getElementById('parent-budget').value = b.parent_id;
            }
        }

        async function deleteBudget(id) {
            if(confirm("Точно удалить этот лимит?")) {
                await supabaseClient.from('budgets').delete().eq('id', id);
                initData();
            }
        }

        async function savePayment(e) {
            e.preventDefault();
            const id = document.getElementById('pay-id').value;
            const payload = {
                title: document.getElementById('pay-title').value,
                amount: document.getElementById('pay-amount').value,
                currency: document.getElementById('pay-currency').value,
                due_date: document.getElementById('pay-date').value,
                payment_type: document.getElementById('pay-type').value
            };
            if(id) { await supabaseClient.from('upcoming_payments').update(payload).eq('id', id); } 
            else { await supabaseClient.from('upcoming_payments').insert([payload]); }
            
            closeModal('payment-modal'); initData();
        }

        async function editPayment(id) {
            const p = payments.find(x => x.id === id);
            if(!p) return;
            openNewPaymentModal();
            document.getElementById('payment-modal-title').innerText = 'Редактировать платеж';
            document.getElementById('pay-id').value = p.id;
            document.getElementById('pay-title').value = p.title;
            document.getElementById('pay-amount').value = p.amount;
            document.getElementById('pay-currency').value = p.currency;
            document.getElementById('pay-date').value = p.due_date;
            document.getElementById('pay-type').value = p.payment_type;
        }

        async function deletePayment(id) {
            if(confirm("Удалить этот платеж из календаря?")) {
                await supabaseClient.from('upcoming_payments').delete().eq('id', id);
                initData();
            }
        }

        initData();
    </script>
</body>
</html>
