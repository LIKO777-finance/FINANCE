<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinFlow - Операции</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#4f46e5',
                        'brand-light': '#e0e7ff',
                    }
                }
            }
        }
    </script>
    <style>
        .modal-enter { opacity: 0; transform: scale(0.95); }
        .modal-enter-active { opacity: 1; transform: scale(1); transition: all 0.2s ease-out; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans flex h-screen overflow-hidden">

    <!-- ЛЕВОЕ МЕНЮ -->
    <aside class="w-64 bg-white border-r border-gray-200 flex flex-col justify-between hidden md:flex shrink-0">
        <div>
            <div class="p-6 flex items-center space-x-2">
                <div class="w-8 h-8 bg-brand rounded-lg flex items-center justify-center">
                    <div class="w-4 h-4 bg-white rounded-sm transform rotate-45"></div>
                </div>
                <span class="text-xl font-bold text-gray-900">FinFlow</span>
            </div>
            <nav class="mt-4 px-4 space-y-1">
                <a href="index.html" class="flex items-center space-x-3 w-full px-4 py-3 text-gray-600 hover:bg-gray-50 rounded-xl font-medium transition">
                    <i class="ph ph-wallet text-xl"></i>
                    <span>Счета</span>
                </a>
                <a href="operations.html" class="flex items-center space-x-3 w-full px-4 py-3 bg-brand-light text-brand rounded-xl font-medium transition">
                    <i class="ph ph-list-dashes text-xl"></i>
                    <span>Операции</span>
                </a>
            </nav>
        </div>
        <div class="p-4 border-t border-gray-200 m-4 flex items-center space-x-3 cursor-pointer hover:bg-gray-50 rounded-xl transition">
            <img src="https://ui-avatars.com/api/?name=Андрей+Иванов&background=random" alt="Avatar" class="w-10 h-10 rounded-full" />
            <div class="flex-1">
                <p class="text-sm font-semibold text-gray-900">Андрей Иванов</p>
                <p class="text-xs text-gray-500">Профиль</p>
            </div>
            <i class="ph ph-caret-down text-gray-400"></i>
        </div>
    </aside>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <main class="flex-1 overflow-y-auto">
        <header class="bg-white border-b border-gray-200 px-8 py-4 flex justify-between items-center sticky top-0 z-10">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Операции</h1>
                <p class="text-sm text-gray-500 mt-1">История доходов, расходов и переводов</p>
            </div>
            <div class="flex items-center space-x-4">
                <button onclick="exportToCSV()" class="flex items-center space-x-2 border border-gray-200 px-4 py-2 rounded-xl hover:bg-gray-50 transition text-gray-700">
                    <i class="ph ph-download-simple"></i>
                    <span class="hidden sm:inline">Экспорт CSV</span>
                </button>
                <button onclick="openOpModal()" class="flex items-center space-x-2 bg-brand text-white px-4 py-2 rounded-xl hover:bg-indigo-700 transition">
                    <i class="ph ph-plus"></i>
                    <span class="hidden sm:inline">Операция</span>
                </button>
            </div>
        </header>

        <div class="p-8">
            <!-- ФИЛЬТРЫ -->
            <div class="flex flex-wrap justify-between items-center mb-6 border-b border-gray-200 pb-3 gap-4">
                <div class="flex space-x-6 overflow-x-auto min-w-max" id="op-tabs-container">
                    <button onclick="setOpTab('Все')" class="op-tab-btn font-medium text-brand border-b-2 border-brand pb-3 -mb-3" data-tab="Все">Все</button>
                    <button onclick="setOpTab('Доходы')" class="op-tab-btn font-medium text-gray-500 hover:text-gray-800 transition pb-3 -mb-3" data-tab="Доходы">Доходы</button>
                    <button onclick="setOpTab('Расходы')" class="op-tab-btn font-medium text-gray-500 hover:text-gray-800 transition pb-3 -mb-3" data-tab="Расходы">Расходы</button>
                    <button onclick="setOpTab('Переводы')" class="op-tab-btn font-medium text-gray-500 hover:text-gray-800 transition pb-3 -mb-3" data-tab="Переводы">Переводы</button>
                    <button onclick="setOpTab('Инвестиции')" class="op-tab-btn font-medium text-gray-500 hover:text-gray-800 transition pb-3 -mb-3" data-tab="Инвестиции">Инвестиции</button>
                </div>
                
                <div class="ml-auto">
                    <select id="op-currency-filter" onchange="renderOperations()" class="px-3 py-1.5 text-sm border border-gray-200 rounded-lg text-gray-700 outline-none hover:border-brand focus:border-brand transition bg-white cursor-pointer">
                        <option value="All">Все валюты</option>
                        <option value="Br">Только Br</option>
                        <option value="₽">Только ₽</option>
                        <option value="$">Только $</option>
                        <option value="€">Только €</option>
                    </select>
                </div>
            </div>

            <!-- СПИСОК ОПЕРАЦИЙ -->
            <div id="operations-list" class="space-y-3 pb-10">
                <div class="p-8 text-center text-gray-500">Загрузка операций...</div>
            </div>
        </div>
    </main>

    <!-- ПРАВОЕ МЕНЮ (СВОДКА) -->
    <aside class="w-80 bg-white border-l border-gray-200 overflow-y-auto p-6 hidden lg:block shrink-0">
        <div class="mb-8">
            <h3 class="font-semibold text-gray-900 mb-4 text-sm uppercase tracking-wider">Топ-3 крупные операции</h3>
            <div id="top-operations-container" class="space-y-3">
                <!-- Заполняется через JS -->
            </div>
        </div>

        <div>
            <h3 class="font-semibold text-gray-900 mb-4 text-sm uppercase tracking-wider">Топ категории</h3>
            <div class="space-y-4">
                <div class="bg-red-50 p-4 rounded-xl border border-red-100">
                    <p class="text-xs text-red-500 font-semibold mb-1">ГЛАВНЫЙ РАСХОД</p>
                    <p id="top-expense-cat" class="text-gray-900 font-medium">-</p>
                </div>
                <div class="bg-emerald-50 p-4 rounded-xl border border-emerald-100">
                    <p class="text-xs text-emerald-600 font-semibold mb-1">ГЛАВНЫЙ ДОХОД</p>
                    <p id="top-income-cat" class="text-gray-900 font-medium">-</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- МОДАЛКА ДОБАВЛЕНИЯ/РЕДАКТИРОВАНИЯ ОПЕРАЦИИ -->
    <div id="op-modal" class="fixed inset-0 bg-gray-900 bg-opacity-50 hidden items-center justify-center z-50 transition-opacity p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6 transform scale-95 transition-transform" id="op-modal-content">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-gray-900" id="op-modal-title">Новая операция</h3>
                <button onclick="closeOpModal()" class="text-gray-400 hover:text-gray-700 transition">
                    <i class="ph ph-x text-2xl"></i>
                </button>
            </div>
            
            <form onsubmit="submitOperation(event)" class="space-y-4">
                <input type="hidden" id="op-id"> <!-- Для редактирования -->

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Тип</label>
                        <select id="op-type" onchange="updateFormFields()" class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-brand outline-none transition bg-white">
                            <option value="Расход">Расход</option>
                            <option value="Доход">Доход</option>
                            <option value="Перевод">Перевод</option>
                            <option value="Инвестиция">Инвестиция</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Дата</label>
                        <input type="date" id="op-date" required class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-brand outline-none transition">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Сумма</label>
                        <input type="number" id="op-amount" required placeholder="0.00" step="0.01" class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-brand outline-none transition">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Валюта</label>
                        <select id="op-currency" class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-brand outline-none transition bg-white">
                            <option value="Br">Br (BYN)</option>
                            <option value="₽">₽ (RUB)</option>
                            <option value="$">$ (USD)</option>
                            <option value="€">€ (EUR)</option>
                        </select>
                    </div>
                </div>

                <!-- Контейнер для категорий (только Доход/Расход) -->
                <div id="category-container" class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Категория</label>
                        <select id="op-category" onchange="updateSubcategories()" class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-brand outline-none transition bg-white">
                            <!-- Заполняется JS -->
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Подкатегория</label>
                        <select id="op-subcategory" class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-brand outline-none transition bg-white">
                            <!-- Заполняется JS -->
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Счет</label>
                    <select id="op-account" class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-brand outline-none transition bg-white">
                        <option value="Мой кошелек">Мой кошелек (заглушка)</option>
                        <!-- В реале тут счета из базы -->
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Примечание</label>
                    <input type="text" id="op-notes" placeholder="Комментарий к операции..." class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-brand outline-none transition">
                </div>
                
                <button type="submit" class="w-full bg-brand text-white font-medium py-3 rounded-xl hover:bg-indigo-700 transition mt-6" id="op-submit-btn">
                    Сохранить операцию
                </button>
            </form>
        </div>
    </div>

    <script>
        // Имитация базы данных (пока не подключим Supabase для операций)
        let operationsData = [
            { id: 1, type: 'Расход', amount: 150.50, currency: 'Br', category: 'Еда', subcategory: 'мясо', account: 'Карта Альфа', date: '2023-10-25', notes: 'Закупка на неделю' },
            { id: 2, type: 'Доход', amount: 5000, currency: '₽', category: 'Tutoring', subcategory: 'TOEFL', account: 'Тинькофф', date: '2023-10-24', notes: 'Ученик Иван' },
            { id: 3, type: 'Расход', amount: 300, currency: '₽', category: 'Развлечения', subcategory: 'подписки', account: 'Тинькофф', date: '2023-10-23', notes: 'Spotify' },
            { id: 4, type: 'Инвестиция', amount: 100, currency: '$', category: 'Акции', subcategory: '', account: 'Брокер', date: '2023-10-22', notes: 'S&P 500' }
        ];

        let currentOpTab = 'Все';
        let openMenuId = null;

        // Структура категорий и подкатегорий
        const categoriesData = {
            'Расход': {
                'Основное': ['квартира', 'коммуналка', 'интернет', 'телефоны', 'налоги бел', 'налоги рос', 'налоги 13%', 'подписки'],
                'Еда': ['мясо', 'колбасы', 'хлебобулочные', 'молочка', 'крупы', 'консервы', 'рыба', 'специи', 'снэки', 'фрукты и овощи', 'вода', 'напитки', 'алкоголь', 'масло', 'конфеты', 'чай', 'на заказ', 'соусы', 'пакет'],
                'Машина': ['бензин', 'сервис', 'мойка'],
                'Развлечения': ['развлечения', 'красота', 'гигиена', 'медицина', 'одежда', 'обувь', 'аксессуары', 'книги', 'подарки', 'электроника', 'учеба'],
                'Дом': ['декор', 'чистящие', 'принадлежности', 'гигиена дома', 'цветы'],
                'Путешествия': ['такси', 'виза', 'карманные']
            },
            'Доход': {
                'Tutoring': ['general', 'TOEFL'],
                'Мама': [],
                'Подарок': [],
                'Подработка': [],
                'Проценты': [],
                'Кэшбэк': []
            },
            'Перевод': { 'Перевод между счетами': [] },
            'Инвестиция': { 'Покупка активов': [], 'Пополнение брокера': [] }
        };

        const formatMoney = (amount, currency = '₽') => {
            return Number(amount).toLocaleString('ru-RU', { minimumFractionDigits: 0, maximumFractionDigits: 2 }) + ' ' + currency;
        };

        const formatDate = (dateStr) => {
            return new Date(dateStr).toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
        };

        /* --- ЛОГИКА ВКЛАДОК И ФИЛЬТРОВ --- */
        function setOpTab(tabName) {
            currentOpTab = tabName;
            document.querySelectorAll('.op-tab-btn').forEach(btn => {
                btn.className = btn.dataset.tab === tabName 
                    ? 'op-tab-btn font-medium text-brand border-b-2 border-brand pb-3 -mb-3'
                    : 'op-tab-btn font-medium text-gray-500 hover:text-gray-800 transition pb-3 -mb-3';
            });
            renderOperations();
        }

        /* --- МЕНЮ ОПЕРАЦИЙ (РЕДАКТИРОВАНИЕ/УДАЛЕНИЕ) --- */
        function toggleOpMenu(id, event) {
            event.stopPropagation();
            const allMenus = document.querySelectorAll('[id^="op-menu-"]');
            allMenus.forEach(menu => {
                if(menu.id !== `op-menu-${id}`) menu.classList.add('hidden');
            });
            const menu = document.getElementById(`op-menu-${id}`);
            if (menu) menu.classList.toggle('hidden');
            openMenuId = menu && !menu.classList.contains('hidden') ? id : null;
        }

        document.addEventListener('click', (e) => {
            if (openMenuId && !e.target.closest('.op-menu-container')) {
                document.getElementById(`op-menu-${openMenuId}`)?.classList.add('hidden');
                openMenuId = null;
            }
        });

        function editOperation(id) {
            const op = operationsData.find(o => o.id == id);
            if(!op) return;
            
            document.getElementById('op-id').value = op.id;
            document.getElementById('op-type').value = op.type;
            document.getElementById('op-date').value = op.date;
            document.getElementById('op-amount').value = op.amount;
            document.getElementById('op-currency').value = op.currency;
            document.getElementById('op-notes').value = op.notes || '';
            
            updateFormFields();
            document.getElementById('op-category').value = op.category;
            updateSubcategories();
            document.getElementById('op-subcategory').value = op.subcategory;

            document.getElementById('op-modal-title').innerText = 'Редактировать операцию';
            openOpModal(true);
            document.getElementById(`op-menu-${id}`)?.classList.add('hidden');
        }

        function deleteOperation(id) {
            if(confirm('Удалить эту операцию? Это действие нельзя отменить.')) {
                operationsData = operationsData.filter(o => o.id != id);
                renderOperations();
            }
        }

        /* --- ОТОБРАЖЕНИЕ ОПЕРАЦИЙ И СТАТИСТИКИ --- */
        function renderOperations() {
            const container = document.getElementById('operations-list');
            const currencyFilter = document.getElementById('op-currency-filter').value;
            
            let filtered = operationsData;
            
            // Фильтр по типу
            if (currentOpTab === 'Доходы') filtered = filtered.filter(o => o.type === 'Доход');
            if (currentOpTab === 'Расходы') filtered = filtered.filter(o => o.type === 'Расход');
            if (currentOpTab === 'Переводы') filtered = filtered.filter(o => o.type === 'Перевод');
            if (currentOpTab === 'Инвестиции') filtered = filtered.filter(o => o.type === 'Инвестиция');

            // Фильтр по валюте
            if (currencyFilter !== 'All') {
                filtered = filtered.filter(o => o.currency === currencyFilter);
            }

            // Сортировка по дате (новые сверху)
            filtered.sort((a, b) => new Date(b.date) - new Date(a.date));

            if (filtered.length === 0) {
                container.innerHTML = `<div class="p-8 text-center text-gray-400 bg-white rounded-2xl border border-gray-100 border-dashed">Операций не найдено.</div>`;
            } else {
                container.innerHTML = filtered.map(op => createOpHTML(op)).join('');
            }

            updateSidebarStats();
        }

        function createOpHTML(op) {
            let iconClass, iconName, amountColor, sign;
            
            if (op.type === 'Доход') {
                iconClass = 'bg-emerald-100 text-emerald-600'; iconName = 'ph-arrow-down-left'; amountColor = 'text-emerald-600'; sign = '+';
            } else if (op.type === 'Расход') {
                iconClass = 'bg-red-100 text-red-600'; iconName = 'ph-arrow-up-right'; amountColor = 'text-gray-900'; sign = '-';
            } else if (op.type === 'Инвестиция') {
                iconClass = 'bg-purple-100 text-purple-600'; iconName = 'ph-trend-up'; amountColor = 'text-purple-600'; sign = '';
            } else {
                iconClass = 'bg-blue-100 text-blue-600'; iconName = 'ph-arrows-left-right'; amountColor = 'text-gray-900'; sign = '';
            }

            let categoryText = op.category;
            if (op.subcategory) categoryText += ` <span class="text-gray-400 text-xs">/ ${op.subcategory}</span>`;

            return `
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between hover:shadow-md transition gap-4">
                <div class="flex items-center gap-4 w-[60%]">
                    <div class="w-10 h-10 rounded-xl flex items-center justify-center text-xl shrink-0 ${iconClass}">
                        <i class="ph ${iconName}"></i>
                    </div>
                    <div class="min-w-0">
                        <h3 class="font-medium text-gray-900 truncate">${categoryText}</h3>
                        <p class="text-xs text-gray-500 truncate mt-0.5">${formatDate(op.date)} • ${op.account} ${op.notes ? `• <i>${op.notes}</i>` : ''}</p>
                    </div>
                </div>
                <div class="w-[30%] text-right pr-2">
                    <p class="font-semibold ${amountColor} text-base">${sign}${formatMoney(op.amount, op.currency)}</p>
                </div>
                <div class="w-[10%] flex justify-end relative op-menu-container">
                    <button onclick="toggleOpMenu('${op.id}', event)" class="p-2 text-gray-400 hover:text-gray-900 hover:bg-gray-100 rounded-xl transition">
                        <i class="ph ph-dots-three-vertical text-lg"></i>
                    </button>
                    <div id="op-menu-${op.id}" class="hidden absolute right-0 top-full mt-1 w-32 bg-white border border-gray-100 rounded-xl shadow-lg z-10 py-1">
                        <button onclick="editOperation('${op.id}')" class="w-full px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 flex items-center transition"><i class="ph ph-pencil-simple mr-2"></i>Изменить</button>
                        <button onclick="deleteOperation('${op.id}')" class="w-full px-4 py-2 text-sm text-red-600 hover:bg-red-50 flex items-center transition"><i class="ph ph-trash mr-2"></i>Удалить</button>
                    </div>
                </div>
            </div>`;
        }

        function updateSidebarStats() {
            // Топ 3 операции по абсолютной величине (без учета валюты для простоты примера)
            const sortedOps = [...operationsData].sort((a, b) => b.amount - a.amount).slice(0, 3);
            const topOpsContainer = document.getElementById('top-operations-container');
            
            topOpsContainer.innerHTML = sortedOps.map(op => `
                <div class="flex justify-between items-center bg-gray-50 p-3 rounded-lg border border-gray-100">
                    <div>
                        <p class="text-sm font-medium text-gray-900 truncate max-w-[120px]">${op.category}</p>
                        <p class="text-xs text-gray-500">${formatDate(op.date)}</p>
                    </div>
                    <span class="text-sm font-bold text-gray-900">${formatMoney(op.amount, op.currency)}</span>
                </div>
            `).join('');

            // Считаем топ категории
            let expCats = {}, incCats = {};
            operationsData.forEach(op => {
                if(op.type === 'Расход') expCats[op.category] = (expCats[op.category] || 0) + 1;
                if(op.type === 'Доход') incCats[op.category] = (incCats[op.category] || 0) + 1;
            });

            const topExp = Object.keys(expCats).sort((a,b) => expCats[b] - expCats[a])[0] || 'Нет данных';
            const topInc = Object.keys(incCats).sort((a,b) => incCats[b] - incCats[a])[0] || 'Нет данных';

            document.getElementById('top-expense-cat').innerText = topExp;
            document.getElementById('top-income-cat').innerText = topInc;
        }

        /* --- ЭКСПОРТ В CSV --- */
        function exportToCSV() {
            let csvContent = "data:text/csv;charset=utf-8,\uFEFF"; // \uFEFF для поддержки кириллицы в Excel
            csvContent += "Дата,Тип,Категория,Подкатегория,Сумма,Валюта,Счет,Примечание\n";
            
            operationsData.forEach(op => {
                let row = [
                    op.date, op.type, op.category, op.subcategory || '', 
                    op.amount, op.currency, op.account, op.notes || ''
                ].map(v => `"${v}"`).join(","); // Кавычки спасают от запятых в тексте
                csvContent += row + "\n";
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `operations_${new Date().toISOString().split('T')[0]}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        /* --- МОДАЛЬНОЕ ОКНО И ФОРМА --- */
        const opModal = document.getElementById('op-modal');
        const opModalContent = document.getElementById('op-modal-content');

        function openOpModal(isEdit = false) {
            if(!isEdit) {
                document.getElementById('op-id').value = '';
                document.getElementById('op-modal-title').innerText = 'Новая операция';
                document.getElementById('op-date').valueAsDate = new Date();
                document.getElementById('op-type').value = 'Расход';
                updateFormFields();
            }
            opModal.classList.remove('hidden'); opModal.classList.add('flex');
            setTimeout(() => { opModalContent.classList.remove('scale-95'); opModalContent.classList.add('scale-100'); }, 10);
        }

        function closeOpModal() {
            opModalContent.classList.remove('scale-100'); opModalContent.classList.add('scale-95');
            setTimeout(() => {
                opModal.classList.add('hidden'); opModal.classList.remove('flex');
                document.getElementById('op-amount').value = '';
                document.getElementById('op-notes').value = '';
            }, 150);
        }

        function updateFormFields() {
            const type = document.getElementById('op-type').value;
            const catSelect = document.getElementById('op-category');
            
            catSelect.innerHTML = '';
            
            const cats = Object.keys(categoriesData[type] || {});
            cats.forEach(cat => {
                catSelect.innerHTML += `<option value="${cat}">${cat}</option>`;
            });
            
            updateSubcategories();
        }

        function updateSubcategories() {
            const type = document.getElementById('op-type').value;
            const cat = document.getElementById('op-category').value;
            const subSelect = document.getElementById('op-subcategory');
            
            subSelect.innerHTML = '';
            const subs = categoriesData[type]?.[cat] || [];
            
            if (subs.length === 0) {
                subSelect.innerHTML = '<option value="">Нет подкатегорий</option>';
                subSelect.disabled = true;
            } else {
                subSelect.disabled = false;
                subs.forEach(sub => {
                    subSelect.innerHTML += `<option value="${sub}">${sub}</option>`;
                });
            }
        }

        function submitOperation(e) {
            e.preventDefault();
            
            const id = document.getElementById('op-id').value;
            const newOp = {
                id: id ? id : Date.now(), // Генерируем ID для локальной версии
                type: document.getElementById('op-type').value,
                date: document.getElementById('op-date').value,
                amount: parseFloat(document.getElementById('op-amount').value),
                currency: document.getElementById('op-currency').value,
                category: document.getElementById('op-category').value,
                subcategory: document.getElementById('op-subcategory').value,
                account: document.getElementById('op-account').value,
                notes: document.getElementById('op-notes').value
            };

            if (id) {
                const index = operationsData.findIndex(o => o.id == id);
                if(index !== -1) operationsData[index] = newOp;
            } else {
                operationsData.push(newOp);
            }

            closeOpModal();
            renderOperations();
        }

        // Инициализация при загрузке
        document.getElementById('op-date').valueAsDate = new Date();
        updateFormFields();
        renderOperations();

    </script>
</body>
</html>
