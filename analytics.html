<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinFlow - Аналитика</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#4f46e5',
                        'brand-light': '#e0e7ff',
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #d1d5db; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans flex h-screen overflow-hidden">

    <aside class="w-64 bg-white border-r border-gray-200 flex flex-col hidden md:flex">
        <div class="h-16 flex items-center px-6 border-b border-gray-200">
            <span class="text-xl font-bold text-brand">FinFlow</span>
        </div>
        <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
            <a href="index.html" class="flex items-center gap-3 px-3 py-2 text-gray-600 hover:bg-gray-50 rounded-lg"><i class="ph ph-wallet text-xl"></i>Счета</a>
            <a href="operations.html" class="flex items-center gap-3 px-3 py-2 text-gray-600 hover:bg-gray-50 rounded-lg"><i class="ph ph-list-dashes text-xl"></i>Операции</a>
            <a href="budgets.html" class="flex items-center gap-3 px-3 py-2 text-gray-600 hover:bg-gray-50 rounded-lg"><i class="ph ph-chart-pie-slice text-xl"></i>Бюджеты</a>
            <a href="analytics.html" class="flex items-center gap-3 px-3 py-2 bg-brand-light text-brand font-medium rounded-lg"><i class="ph ph-trend-up text-xl"></i>Аналитика</a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        
        <header class="bg-white border-b border-gray-200 px-8 py-5 flex items-center justify-between z-10 flex-shrink-0">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Аналитика</h1>
            </div>

            <div class="flex items-center gap-4">
                <select id="display-currency" onchange="processData()" class="bg-gray-50 border border-gray-200 text-gray-900 rounded-lg focus:ring-brand focus:border-brand p-2 outline-none font-medium text-sm">
                    <option value="Br">В BYN</option>
                    <option value="₽">В RUB</option>
                    <option value="$">В USD</option>
                    <option value="€">В EUR</option>
                </select>

                <div class="flex items-center bg-gray-100 rounded-lg p-1">
                    <button onclick="changeMonth(-1)" class="p-1.5 hover:bg-white rounded-md transition-colors"><i class="ph ph-caret-left text-lg"></i></button>
                    <span id="current-month" class="px-3 font-medium min-w-[130px] text-center text-sm capitalize">Июль 2026</span>
                    <button onclick="changeMonth(1)" class="p-1.5 hover:bg-white rounded-md transition-colors"><i class="ph ph-caret-right text-lg"></i></button>
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8">
            <div class="max-w-7xl mx-auto space-y-6">
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                        <p class="text-sm text-gray-500 font-medium mb-1">Поступления</p>
                        <p class="text-2xl font-bold text-gray-900" id="total-income">0.00</p>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                        <p class="text-sm text-gray-500 font-medium mb-1">Расходы</p>
                        <p class="text-2xl font-bold text-gray-900" id="total-expense">0.00</p>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                        <p class="text-sm text-gray-500 font-medium mb-1">Денежный поток</p>
                        <p class="text-2xl font-bold text-brand" id="net-flow">0.00</p>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    
                    <div class="lg:col-span-2 space-y-6">
                        
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                            <h3 class="text-lg font-bold text-gray-900 mb-4">Движение средств по дням</h3>
                            <div class="h-64 w-full">
                                <canvas id="cashFlowChart"></canvas>
                            </div>
                        </div>

                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                            <h3 class="text-lg font-bold text-gray-900 mb-4">Самые крупные расходы за месяц</h3>
                            <div id="top-expenses-list" class="space-y-4">
                                </div>
                        </div>
                    </div>

                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col">
                        <div class="flex items-center justify-between mb-6">
                            <h3 class="text-lg font-bold text-gray-900">Категории</h3>
                            <div class="flex bg-gray-100 p-1 rounded-lg">
                                <button onclick="setCategoryType('Расход')" id="btn-type-expense" class="px-3 py-1 text-sm font-medium rounded bg-white shadow-sm text-gray-900">Расходы</button>
                                <button onclick="setCategoryType('Доход')" id="btn-type-income" class="px-3 py-1 text-sm font-medium rounded text-gray-500 hover:text-gray-900">Доходы</button>
                            </div>
                        </div>

                        <div class="h-48 relative flex justify-center items-center mb-6">
                            <canvas id="categoryDonutChart"></canvas>
                            <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                                <span class="text-xs text-gray-500" id="donut-center-label">Всего</span>
                                <span class="font-bold text-gray-900" id="donut-center-value">0</span>
                            </div>
                        </div>

                        <div id="category-list" class="flex-1 overflow-y-auto space-y-4 pr-2">
                            </div>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <script>
        // ВСТАВЬ СВОИ КЛЮЧИ SUPABASE
        const supabaseUrl = 'YOUR_URL';
        const supabaseKey = 'YOUR_KEY';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        // Состояние страницы
        let currentDate = new Date();
        let currentCategoryType = 'Расход';
        let rawTransactions = []; 
        let categoryChartInstance = null;
        let flowChartInstance = null;

        // Палитра для категорий
        const categoryColors = ['#4f46e5', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#06b6d4', '#ec4899', '#3b82f6'];

        // Курсы валют для приведения к единому знаменателю (В идеале тянуть по API, но пока статика относительно BYN)
        const ratesToByn = {
            'Br': 1,
            '₽': 0.036, // 100 RUB = 3.6 BYN
            '$': 3.20,  // 1 USD = 3.2 BYN
            '€': 3.45   // 1 EUR = 3.45 BYN
        };

        const monthNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];

        function init() {
            updateMonthUI();
            fetchData();
        }

        function updateMonthUI() {
            document.getElementById('current-month').innerText = `${monthNames[currentDate.getMonth()]} ${currentDate.getFullYear()}`;
        }

        async function changeMonth(delta) {
            currentDate.setMonth(currentDate.getMonth() + delta);
            updateMonthUI();
            await fetchData();
        }

        function setCategoryType(type) {
            currentCategoryType = type;
            document.getElementById('btn-type-expense').className = type === 'Расход' ? 'px-3 py-1 text-sm font-medium rounded bg-white shadow-sm text-gray-900' : 'px-3 py-1 text-sm font-medium rounded text-gray-500 hover:text-gray-900';
            document.getElementById('btn-type-income').className = type === 'Доход' ? 'px-3 py-1 text-sm font-medium rounded bg-white shadow-sm text-gray-900' : 'px-3 py-1 text-sm font-medium rounded text-gray-500 hover:text-gray-900';
            processData();
        }

        // Загрузка данных из Supabase
        async function fetchData() {
            const startStr = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1).toISOString();
            const endStr = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0, 23, 59, 59).toISOString();

            try {
                // Исключаем переводы между счетами, чтобы не ломать статистику
                const { data, error } = await supabaseClient
                    .from('transactions')
                    .select('*')
                    .gte('date', startStr)
                    .lte('date', endStr)
                    .neq('type', 'Перевод'); 

                if (error) throw error;
                rawTransactions = data || [];
                processData();
            } catch (err) {
                console.error('Ошибка загрузки:', err);
                // Заглушка для теста дизайна, если БД пуста или нет ключей
                rawTransactions = [];
                processData();
            }
        }

        // Конвертер валют
        function getConvertedAmount(amount, txCurrency, targetCurrency) {
            const amountInByn = amount * (ratesToByn[txCurrency] || 1);
            return amountInByn / (ratesToByn[targetCurrency] || 1);
        }

        function formatMoney(amount, currency) {
            return new Intl.NumberFormat('ru-RU', { style: 'currency', currency: currency === 'Br' ? 'BYN' : currency === '₽' ? 'RUB' : currency === '$' ? 'USD' : 'EUR' }).format(amount);
        }

        // Главная функция обработки и распределения данных
        function processData() {
            const targetCur = document.getElementById('display-currency').value;
            
            let totalInc = 0;
            let totalExp = 0;
            const categorySums = {};
            const dailyData = {}; 

            // Подготовка структуры для графика по дням
            const daysInMonth = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0).getDate();
            for (let i = 1; i <= daysInMonth; i++) dailyData[i] = { inc: 0, exp: 0 };

            // Расчеты
            rawTransactions.forEach(tx => {
                const amount = parseFloat(tx.amount) || 0;
                const converted = getConvertedAmount(amount, tx.currency, targetCur);
                const day = new Date(tx.date).getDate();

                if (tx.type === 'Доход') {
                    totalInc += converted;
                    dailyData[day].inc += converted;
                    if (currentCategoryType === 'Доход') {
                        const cat = tx.category || 'Прочее';
                        categorySums[cat] = (categorySums[cat] || 0) + converted;
                    }
                } else if (tx.type === 'Расход') {
                    totalExp += converted;
                    dailyData[day].exp += converted;
                    if (currentCategoryType === 'Расход') {
                        const cat = tx.category || 'Прочее';
                        categorySums[cat] = (categorySums[cat] || 0) + converted;
                    }
                }
            });

            // Обновление карточек
            document.getElementById('total-income').innerText = formatMoney(totalInc, targetCur);
            document.getElementById('total-expense').innerText = formatMoney(totalExp, targetCur);
            document.getElementById('net-flow').innerText = formatMoney(totalInc - totalExp, targetCur);
            
            const totalForDonut = currentCategoryType === 'Расход' ? totalExp : totalInc;
            document.getElementById('donut-center-value').innerText = formatMoney(totalForDonut, targetCur);

            renderCashFlowChart(dailyData, targetCur);
            renderCategorySection(categorySums, totalForDonut, targetCur);
            renderTopExpenses();
        }

        function renderCashFlowChart(dailyData, currency) {
            const labels = Object.keys(dailyData);
            const incData = labels.map(d => dailyData[d].inc);
            const expData = labels.map(d => dailyData[d].exp);

            if (flowChartInstance) flowChartInstance.destroy();
            const ctx = document.getElementById('cashFlowChart').getContext('2d');
            
            flowChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Доходы', data: incData, backgroundColor: '#10b981', borderRadius: 4 },
                        { label: 'Расходы', data: expData, backgroundColor: '#ef4444', borderRadius: 4 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } }, // Легенда очевидна из цветов
                    scales: {
                        x: { grid: { display: false } },
                        y: { border: { dash: [4, 4] }, grid: { color: '#f3f4f6' } }
                    }
                }
            });
        }

        function renderCategorySection(categorySums, totalAmount, currency) {
            // Сортировка по убыванию
            const sortedCats = Object.entries(categorySums).sort((a, b) => b[1] - a[1]);
            
            const labels = sortedCats.map(c => c[0]);
            const data = sortedCats.map(c => c[1]);

            // Рендер кольца (Donut)
            if (categoryChartInstance) categoryChartInstance.destroy();
            const ctx = document.getElementById('categoryDonutChart').getContext('2d');
            categoryChartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels.length ? labels : ['Нет данных'],
                    datasets: [{
                        data: data.length ? data : [1],
                        backgroundColor: data.length ? categoryColors : ['#e5e7eb'],
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false, cutout: '75%',
                    plugins: { legend: { display: false } } // Прячем легенду, она будет в списке ниже
                }
            });

            // Рендер HTML списка с прогресс-барами
            const listHtml = sortedCats.map((cat, index) => {
                const name = cat[0];
                const amount = cat[1];
                const percent = totalAmount > 0 ? Math.round((amount / totalAmount) * 100) : 0;
                const color = categoryColors[index % categoryColors.length];

                return `
                <div>
                    <div class="flex justify-between text-sm mb-1">
                        <span class="font-medium text-gray-700 flex items-center gap-2">
                            <span class="w-3 h-3 rounded-full" style="background-color: ${color}"></span>
                            ${name}
                        </span>
                        <span class="text-gray-900 font-medium">${formatMoney(amount, currency)}</span>
                    </div>
                    <div class="w-full bg-gray-100 rounded-full h-1.5">
                        <div class="h-1.5 rounded-full" style="width: ${percent}%; background-color: ${color}"></div>
                    </div>
                </div>`;
            }).join('');

            document.getElementById('category-list').innerHTML = listHtml || '<p class="text-center text-gray-500 text-sm py-4">Нет операций</p>';
        }

        function renderTopExpenses() {
            // Берем только расходы, сортируем по убыванию сырой суммы (конвертированной)
            const targetCur = document.getElementById('display-currency').value;
            
            const expenses = rawTransactions
                .filter(tx => tx.type === 'Расход')
                .map(tx => ({
                    ...tx,
                    convertedAmount: getConvertedAmount(parseFloat(tx.amount) || 0, tx.currency, targetCur)
                }))
                .sort((a, b) => b.convertedAmount - a.convertedAmount)
                .slice(0, 5); // Топ 5

            const html = expenses.map(tx => {
                // Показываем оригинальную валюту, чтобы понимать, откуда списание
                const origAmount = formatMoney(tx.amount, tx.currency);
                return `
                <div class="flex items-center justify-between p-3 hover:bg-gray-50 rounded-xl border border-transparent hover:border-gray-100 transition-colors">
                    <div class="flex flex-col">
                        <span class="font-medium text-gray-900">${tx.category || 'Без категории'}</span>
                        <span class="text-xs text-gray-500">${tx.subcategory || ''} • ${new Date(tx.date).toLocaleDateString()}</span>
                    </div>
                    <div class="text-right flex flex-col">
                        <span class="font-bold text-gray-900">-${origAmount}</span>
                    </div>
                </div>`;
            }).join('');

            document.getElementById('top-expenses-list').innerHTML = html || '<p class="text-center text-gray-500 text-sm py-4">Нет расходов в этом месяце</p>';
        }

        // Запуск
        document.addEventListener('DOMContentLoaded', init);

    </script>
</body>
</html>
